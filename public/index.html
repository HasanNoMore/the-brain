<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Crypto Dashboard (Live)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .accent-rndr { border-left: 4px solid #3b82f6; }
        .accent-flux { border-left: 4px solid #a855f7; }
        .accent-dusk { border-left: 4px solid #f59e0b; }
        input { outline: none; } 
        .chart-wrapper { height: 0; overflow: hidden; transition: all 0.3s; }
        .chart-wrapper.active { height: 350px; margin-bottom: 1rem; border: 1px solid #334155; }
        .live-dot { height: 8px; width: 8px; background-color: #ef4444; border-radius: 50%; display: inline-block; }
        .live-dot.active { background-color: #22c55e; box-shadow: 0 0 8px #22c55e; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
    </style>
</head>
<body class="pb-20">
    <!-- Header -->
    <div class="max-w-md mx-auto pt-6 px-4 text-center">
        <div class="flex justify-between items-center mb-4">
            <div class="flex items-center gap-2 px-3 py-1 bg-slate-800 rounded-full border border-slate-700">
                <span id="monitor-status-dot" class="live-dot"></span>
                <span id="monitor-status-text" class="text-xs font-mono text-slate-500">Connecting...</span>
            </div>
            <button onclick="testAlert()" class="bg-slate-800 text-xs px-3 py-2 rounded-full border border-slate-700 hover:text-cyan-400">Test Alert</button>
        </div>
        <h1 class="text-2xl font-bold text-white">My Crypto Dashboard</h1>
        <p class="text-xs text-slate-500 mb-6">Permanent Edition • Auto-Alerts</p>
    </div>

    <!-- Content -->
    <div class="max-w-md mx-auto px-4 space-y-4">
        
        <!-- RNDR -->
        <article class="bg-slate-800 rounded-xl overflow-hidden border border-slate-700 accent-rndr p-4" data-coin="RNDR" data-id="render-token">
            <div class="flex justify-between items-start mb-3">
                <div>
                    <h2 class="text-lg font-bold text-white">RNDR <span class="text-blue-400 text-xs">#1</span></h2>
                    <div class="text-2xl font-mono font-bold text-white live-price">...</div>
                </div>
                <button onclick="toggleChart(this, 'BINANCE:RENDERUSDT')" class="bg-slate-700 px-3 py-1 text-[10px] rounded text-white">Chart</button>
            </div>
            <div class="chart-wrapper"></div>
            <div class="grid grid-cols-2 gap-2 mt-2">
                <input type="number" id="buy-rndr" placeholder="Buy Alert ($)" class="bg-slate-900 text-white p-2 text-xs rounded border border-slate-700 text-center">
                <input type="number" id="sell-rndr" placeholder="Sell Alert ($)" class="bg-slate-900 text-white p-2 text-xs rounded border border-slate-700 text-center">
            </div>
        </article>

        <!-- FLUX -->
        <article class="bg-slate-800 rounded-xl overflow-hidden border border-slate-700 accent-flux p-4" data-coin="FLUX" data-id="zelcash">
            <div class="flex justify-between items-start mb-3">
                <div>
                    <h2 class="text-lg font-bold text-white">FLUX <span class="text-purple-400 text-xs">#2</span></h2>
                    <div class="text-2xl font-mono font-bold text-white live-price">...</div>
                </div>
                <button onclick="toggleChart(this, 'BINANCE:FLUXUSDT')" class="bg-slate-700 px-3 py-1 text-[10px] rounded text-white">Chart</button>
            </div>
            <div class="chart-wrapper"></div>
            <div class="grid grid-cols-2 gap-2 mt-2">
                <input type="number" id="buy-flux" placeholder="Buy Alert ($)" class="bg-slate-900 text-white p-2 text-xs rounded border border-slate-700 text-center">
                <input type="number" id="sell-flux" placeholder="Sell Alert ($)" class="bg-slate-900 text-white p-2 text-xs rounded border border-slate-700 text-center">
            </div>
        </article>

        <!-- DUSK -->
        <article class="bg-slate-800 rounded-xl overflow-hidden border border-slate-700 accent-dusk p-4" data-coin="DUSK" data-id="dusk-network">
            <div class="flex justify-between items-start mb-3">
                <div>
                    <h2 class="text-lg font-bold text-white">DUSK <span class="text-amber-400 text-xs">#3</span></h2>
                    <div class="text-2xl font-mono font-bold text-white live-price">...</div>
                </div>
                <button onclick="toggleChart(this, 'BINANCE:DUSKUSDT')" class="bg-slate-700 px-3 py-1 text-[10px] rounded text-white">Chart</button>
            </div>
            <div class="chart-wrapper"></div>
            <div class="grid grid-cols-2 gap-2 mt-2">
                <input type="number" id="buy-dusk" placeholder="Buy Alert ($)" class="bg-slate-900 text-white p-2 text-xs rounded border border-slate-700 text-center">
                <input type="number" id="sell-dusk" placeholder="Sell Alert ($)" class="bg-slate-900 text-white p-2 text-xs rounded border border-slate-700 text-center">
            </div>
        </article>
    </div>

    <!-- LOGIC -->
    <script>
        lucide.createIcons();
        
        // --- HARDCODED KEYS (Injected by Generator) ---
        const TG_TOKEN = "8493017102:AAFOVU_TFonS1353N76Cghbfy4WSLdcYFbk";
        const TG_CHAT = "8456384676";
        // ----------------------------------------------

        let interval;
        let alerted = {};

        window.onload = function() {
            startMonitor();
            // Restore Inputs
            document.querySelectorAll('input').forEach(input => {
                const saved = localStorage.getItem(input.id);
                if(saved) input.value = saved;
                input.addEventListener('input', () => localStorage.setItem(input.id, input.value));
            });
        };

        function startMonitor() {
            if (Notification.permission !== "granted") Notification.requestPermission();
            document.getElementById('monitor-status-dot').classList.add('active');
            document.getElementById('monitor-status-text').innerText = "Live";
            document.getElementById('monitor-status-text').classList.add('text-green-400');
            checkPrice();
            interval = setInterval(checkPrice, 60000);
        }

        async function checkPrice() {
            const articles = document.querySelectorAll('article');
            const ids = Array.from(articles).map(a => a.dataset.id).join(',');
            try {
                const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`);
                const data = await res.json();
                articles.forEach(art => {
                    const price = data[art.dataset.id]?.usd;
                    if(price) {
                        art.querySelector('.live-price').innerText = `$${price}`;
                        checkAlert(art, price);
                    }
                });
            } catch(e) { console.log(e); }
        }

        function checkAlert(art, price) {
            const coin = art.dataset.coin;
            const buy = parseFloat(art.querySelector('input[id^="buy"]').value);
            const sell = parseFloat(art.querySelector('input[id^="sell"]').value);
            
            // 15 min cooldown
            if (Date.now() - (alerted[coin] || 0) < 900000) return;

            let msg = "";
            if(buy && price <= buy) msg = `🚨 BUY ${coin}: $${price}`;
            else if(sell && price >= sell) msg = `💰 SELL ${coin}: $${price}`;

            if(msg) {
                sendTg(msg);
                new Notification("Crypto Alert", { body: msg });
                alerted[coin] = Date.now();
            }
        }

        function sendTg(msg) {
            if(!TG_TOKEN || !TG_CHAT) return;
            // Use no-cors to bypass browser restrictions
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT}&text=${encodeURIComponent(msg)}`, { mode: 'no-cors' });
        }

        function testAlert() {
            if(!TG_TOKEN || !TG_CHAT) { alert("Error: Token/ID missing in this file."); return; }
            sendTg("✅ Test Alert: Connection Works!");
            alert("Test sent! Check your Telegram app now.");
        }

        function toggleChart(btn, symbol) {
            const wrap = btn.closest('article').querySelector('.chart-wrapper');
            const id = 'tv_' + Math.random().toString(36).substr(2, 9);
            if(wrap.classList.contains('active')) {
                wrap.classList.remove('active');
                wrap.innerHTML = '';
            } else {
                wrap.innerHTML = `<div id="${id}" class="w-full h-full"></div>`;
                wrap.classList.add('active');
                new TradingView.widget({
                    "autosize": true, "symbol": symbol, "interval": "D", "timezone": "Etc/UTC",
                    "theme": "dark", "style": "1", "locale": "en", "toolbar_bg": "#f1f3f6",
                    "enable_publishing": false, "hide_top_toolbar": true, "container_id": id
                });
            }
        }
    </script>
</body>
</html>
